<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        
        /* 全局容器：等比例缩放，电脑手机完全一样 */
        .screen {
            position: relative;
            width: 1920px;
            height: 1080px;
            transform-origin: center top;
            margin: 0 auto;
        }

        body{
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #ffe6ee, #ffd6e8, #ffeef8, #fff0f8);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            user-select: none;
        }
        @keyframes bgMove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .falling{
            position:fixed;top:-10%;pointer-events:none;
            animation: fall linear infinite;
            opacity:0.8;
            z-index: 999;
        }
        @keyframes fall{
            0%{transform:translateY(0) rotate(0deg);opacity:0.8;}
            100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
        }

        .text-box{
            position:absolute;
            top:40px;
            width:100%;
            text-align:center;
            font-size:28px;
            color:#d6336c;
            font-weight:bold;
            text-shadow:0 0 10px #fff;
        }

        .person, .flower, .cake, .candle{
            position:absolute;
            border-radius:12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            pointer-events: none;
        }
        .person{
            border-radius:20px;
        }
    </style>
</head>

<body>
    <div class="screen" id="screen">
        <div class="text-box">
            小仙女<br>生日快乐<br>天天开心！
        </div>

        <!-- 你的所有位置、大小 完全不动！ -->
        <img class="person" src="person.jpg" style="width:284px; left:563.594px; top:351.188px;">
        <img class="flower" src="flower.jpg" style="width:128px; left:720.594px; top:528.594px;">
        <img class="cake" src="cake.jpg" style="width:258px; left:976.406px; top:510.594px;">
        <img class="candle" src="money_25.jpg" style="width:122px; left:1039.55px; top:348.234px;">

        <div id="fall"></div>
    </div>

    <audio loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    

<script>
// 等比缩放：手机电脑完全一致
function autoScale() {
  const screen = document.getElementById('screen');
  const scale = window.innerWidth / 1920;
  screen.style.transform = `scale(${scale})`;
}
window.addEventListener('load', autoScale);
window.addEventListener('resize', autoScale);

// 飘落爱心
function createFall(){
    let container = document.getElementById('fall');
    let arr = ['❤️','✨','🌸','💖','🎂'];
    for(let i=0;i<35;i++){
        let el = document.createElement('div');
        el.className = 'falling';
        el.innerText = arr[Math.floor(Math.random()*arr.length)];
        el.style.left = Math.random()*100 + 'vw';
        el.style.fontSize = Math.random()*15 + 12 + 'px';
        el.style.animationDuration = Math.random()*5 + 6 + 's';
        container.appendChild(el);
    }
}
createFall();

// 音乐
document.addEventListener('click',()=>{
    document.querySelector('audio').play();
},{once:true});
</script>
</body>
</html>
